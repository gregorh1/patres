name: patres
description: "Church Fathers & Christian Classics reader"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.2.0
  equatable: ^2.0.8
  intl: ^0.20.2
  flutter_native_splash: ^2.4.6
  google_fonts: ^6.2.1
  wakelock_plus: ^1.2.8
  shared_preferences: ^2.5.0
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/texts/manifest.json
    - assets/texts/augustyn-wyznania.json
    - assets/texts/didache.json
    - assets/texts/chryzostom-mysli.json
    - assets/texts/kempis-nasladowanie.json
    - assets/texts/list-do-diogneta.json
    - assets/texts/benedykt-regula.json
    - assets/texts/bogurodzica.json
    - assets/texts/skarga-kazania-sejmowe.json
    - assets/daily_readings.json
    - assets/authors.json
    - assets/splash_icon.png

flutter_native_splash:
  color: "#F5E6D3"
  color_dark: "#1A1512"
  image: assets/splash_icon.png
  image_dark: assets/splash_icon.png
  android_12:
    color: "#F5E6D3"
    color_dark: "#1A1512"
    image: assets/splash_icon.png
    image_dark: assets/splash_icon.png
